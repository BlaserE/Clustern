# The ultimate executable.
# This is the source of truth for the Ansible configuration.
# It will configure the designated hosts

---
- name: Testing Machine Cluster.
  hosts: metal
  tasks:
    - name: Pinging The Cluster.
      ansible.builtin.ping:

    - name: Hello World.
      ansible.builtin.debug:
        msg: "Hello World"

- name: Physical Hardware Baseline
  hosts: metal 
  become: true
  tasks:
    - name: Update system
      ansible.builtin.apt:
        update_cache: true

    - name: Install essential packages
      ansible.builtin.apt:
        name:
          - vim
          - ufw
          - htop
          - git
          - curl
        state: present
